      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          test -f backend/repair_agents/__init__.py
          test -f backend/repair_agents/router.py
          test -f backend/repair_agents/diagnostic_agent.py
          test -f backend/repair_agents/repair_agent.py
          test -f backend/repair_agents/audit_agent.py
          test -f backend/repair_agents/schemas.py
          test -f backend/repair_agents/logs.py
          test -f backend/repair_agents/safety.py

          python -m py_compile backend/repair_agents/*.py

          echo "HBC3 repair_agents instalado y py_compile OK"
          find backend/repair_agents -maxdepth 1 -type f -print | sort

      - name: Commit files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "hbc3-agent"
          git config user.email "hbc3-agent@users.noreply.github.com"

          git add backend/repair_agents HBC_COMMAND_CENTER

          if git diff --cached --quiet; then
            echo "Sin cambios que confirmar. El módulo puede estar ya instalado."
            test -f backend/repair_agents/router.py
          else
            git commit -m "Direct install HBC3 repair_agents module"
            git push
          fi

      - name: HBC3 Final status
        run: |
          echo "HBC3 FINAL"
          echo "backend/repair_agents instalado"
          echo "APTO PARA TESTING"
          echo "NO VALIDADO EN PRODUCCIÓN"
