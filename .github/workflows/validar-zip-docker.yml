name: Validar ZIP Docker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Ver archivos
        run: |
          ls -la
          find . -maxdepth 2 -type f

      - name: Instalar herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl

      - name: Descomprimir ZIP
        run: |
          ZIP_FILE=$(ls *.zip | head -1)
          echo "ZIP encontrado: $ZIP_FILE"
          unzip "$ZIP_FILE" -d panel-test
          find panel-test -maxdepth 3 -type f | head -100

      - name: Detectar proyecto
        run: |
          PROJECT_DIR=$(find panel-test -name "docker-compose.yml" -exec dirname {} \; | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "No se encontró docker-compose.yml"
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Proyecto detectado en: $PROJECT_DIR"

      - name: Crear .env testing
        run: |
          cd "$PROJECT_DIR"
          cat > .env <<EOF
          DATABASE_URL=postgresql://hbc3_test:test_password@postgres:5432/hbc3_test
          DB_USER=hbc3_test
          DB_PASSWORD=test_password
          DB_HOST=postgres
          REDIS_HOST=redis
          REDIS_URL=redis://redis:6379
          SECRET_KEY=test_jwt_secret
          STRIPE_PUBLIC_KEY=pk_test_xxx
          STRIPE_SECRET_KEY=sk_test_xxx
          PAYPAL_MODE=sandbox
          APP_ENV=testing
          DEBUG=true
          APP_URL=http://localhost:3000
          API_URL=http://localhost:8000
          ADMIN_URL=http://localhost:3001
          CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8000,http://localhost
          EOF

      - name: Validar sintaxis Python
        run: |
          cd "$PROJECT_DIR"
          python3 -m compileall backend

      - name: Levantar Docker
        run: |
          cd "$PROJECT_DIR"
          docker compose up -d

      - name: Esperar servicios
        run: sleep 45

      - name: Ver contenedores
        run: |
          cd "$PROJECT_DIR"
          docker compose ps

      - name: Probar backend
        run: |
          curl -f http://localhost:8000/health || curl -f http://localhost:8000/api/v1/health

      - name: Probar frontend
        run: curl -f http://localhost:3000

      - name: Probar admin
        run: curl -f http://localhost:3001

      - name: Probar adminer
        run: curl -f http://localhost:8080

      - name: Logs si falla
        if: failure()
        run: |
          cd "$PROJECT_DIR" || exit 0
          docker compose ps || true
          docker compose logs backend --tail=100 || true
          docker compose logs nginx --tail=100 || true
          docker compose logs postgres --tail=100 || true
          docker compose logs redis --tail=100 || true
