name: Validar ZIP Docker HBC3 FINAL

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ver archivos
        shell: bash
        run: |
          set -e
          echo "RAIZ:"
          ls -la
          echo "ZIPS:"
          ls -la *.zip || true

      - name: Instalar herramientas
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip curl

      - name: Elegir ZIP correcto
        shell: bash
        run: |
          set -euo pipefail

          echo "Buscando ZIP HBC3..."
          ZIP=""

          for candidate in \
            "HBC3_FINAL_DE_UNA_VEZ_V2_WORKFLOW_OK.zip" \
            "HBC3_FINAL_ROOT_DOCKER_OK.zip" \
            "HBC3_FINAL_DE_UNA_VEZ_REPAIR_AGENTS_FIX.zip"
          do
            if [ -f "$candidate" ]; then
              ZIP="$candidate"
              break
            fi
          done

          if [ -z "$ZIP" ]; then
            ZIP=$(ls -1 *.zip 2>/dev/null | grep -E "HBC3|panel-generator" | tail -n 1 || true)
          fi

          if [ -z "$ZIP" ] || [ ! -f "$ZIP" ]; then
            echo "BLOQUEO_REAL: no hay ZIP válido."
            ls -la
            exit 1
          fi

          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo "ZIP usado: $ZIP"

      - name: Descomprimir ZIP
        shell: bash
        run: |
          set -euo pipefail
          rm -rf panel-test
          mkdir -p panel-test
          unzip -o "$ZIP" -d panel-test
          echo "Estructura descomprimida:"
          find panel-test -maxdepth 4 -type f | head -120

      - name: Detectar proyecto
        shell: bash
        run: |
          set -euo pipefail

          echo "Buscando docker-compose.yml..."
          find panel-test -maxdepth 10 -name "docker-compose.yml" -print

          PROJECT_DIR=$(find panel-test -maxdepth 10 -name "docker-compose.yml" -exec dirname {} \; | head -1 || true)

          if [ -z "$PROJECT_DIR" ]; then
            echo "BLOQUEO_REAL: no se encontró docker-compose.yml dentro del ZIP usado: $ZIP"
            echo "Contenido del ZIP:"
            find panel-test -maxdepth 6 -type f | head -200
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Proyecto detectado: $PROJECT_DIR"

      - name: Crear .env testing
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          cat > .env <<EOF
          DATABASE_URL=postgresql://panel_user:panel_password@postgres:5432/panel_generator
          DB_USER=panel_user
          DB_PASSWORD=panel_password
          DB_NAME=panel_generator
          DB_HOST=postgres
          DB_PORT=5432
          REDIS_URL=redis://redis:6379
          SECRET_KEY=testsecretkey1234567890abcdef
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          APP_ENV=development
          APP_DEBUG=True
          APP_URL=http://localhost:3000
          API_URL=http://localhost:8000
          ADMIN_URL=http://localhost:3001
          CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8000
          STRIPE_SECRET_KEY=sk_test_fake
          STRIPE_PUBLIC_KEY=pk_test_fake
          PAYPAL_MODE=sandbox
          PAYPAL_CLIENT_ID=fake
          PAYPAL_CLIENT_SECRET=fake
          SENDGRID_API_KEY=SG.fake
          TWILIO_ACCOUNT_SID=fake
          TWILIO_AUTH_TOKEN=fake
          TWILIO_PHONE_NUMBER=+1234567890
          LOG_LEVEL=INFO
          EOF

      - name: Validar sintaxis Python
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          python -m py_compile backend/api.py
          if [ -d backend/repair_agents ]; then
            python -m py_compile backend/repair_agents/*.py
          fi
          grep -n "import uvicorn\|repair_agents.router\|uvicorn.run" backend/api.py || true

      - name: Levantar Docker
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          docker compose up -d --build
          sleep 30
          docker compose ps

      - name: Logs backend
        if: always()
        shell: bash
        run: |
          cd "$PROJECT_DIR" || exit 0
          docker compose logs backend --tail=160 || true
          docker compose logs postgres --tail=80 || true

      - name: Probar backend health
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          curl -f http://localhost:8000/health

      - name: Probar repair_agents endpoints
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          curl -f http://localhost:8000/api/v1/repair/logs || true
          curl -s -X POST http://localhost:8000/api/v1/repair/diagnose \
            -H "Content-Type: application/json" \
            -d '{"target":"backend","mode":"testing"}' || true

      - name: Probar frontend
        shell: bash
        run: |
          curl -I http://localhost:3000 || true

      - name: Estado final
        shell: bash
        run: |
          echo "HBC3 FINAL"
          echo "APTO PARA TESTING SI TODOS LOS PASOS ESTAN EN VERDE"
          echo "NO VALIDADO EN PRODUCCION"

      - name: Limpiar
        if: always()
        shell: bash
        run: |
          cd "$PROJECT_DIR" 2>/dev/null && docker compose down -v || true
