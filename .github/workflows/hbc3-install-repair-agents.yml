name: HBC3 Install Repair Agents

on:
  workflow_dispatch:
  push:
    paths:
      - "*repair*agent*.zip"
      - "*repair*agents*.zip"
      - "*REPAIR*AGENTS*.zip"
      - ".github/workflows/hbc3-install-repair-agents.yml"

permissions:
  contents: write

jobs:
  install-repair-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Locate repair_agents ZIP
        id: locate_zip
        shell: bash
        run: |
          set -e

          ZIP_FILE="$(find . -maxdepth 2 -type f \( \
            -iname '*repair*agent*.zip' -o \
            -iname '*repair*agents*.zip' -o \
            -iname '*REPAIR*AGENTS*.zip' \
          \) | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "BLOQUEO_REAL: No se encontró ZIP repair_agents en el repo."
            exit 1
          fi

          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "ZIP encontrado: $ZIP_FILE"

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP safely
        shell: bash
        run: |
          set -e
          rm -rf /tmp/hbc3_repair_agents_extract
          mkdir -p /tmp/hbc3_repair_agents_extract
          unzip -o "${{ steps.locate_zip.outputs.zip_file }}" -d /tmp/hbc3_repair_agents_extract

          echo "Contenido extraído:"
          find /tmp/hbc3_repair_agents_extract -maxdepth 4 -type f | sort

      - name: Install repair_agents module
        shell: bash
        run: |
          set -e

          SOURCE_DIR="$(find /tmp/hbc3_repair_agents_extract -type d -path '*/backend/repair_agents' | head -n 1)"

          if [ -z "$SOURCE_DIR" ]; then
            echo "BLOQUEO_REAL: El ZIP no contiene backend/repair_agents."
            exit 1
          fi

          mkdir -p backend
          rm -rf backend/repair_agents
          cp -R "$SOURCE_DIR" backend/repair_agents

          if [ -d "/tmp/hbc3_repair_agents_extract/HBC_COMMAND_CENTER" ]; then
            mkdir -p HBC_COMMAND_CENTER
            cp -R /tmp/hbc3_repair_agents_extract/HBC_COMMAND_CENTER/. HBC_COMMAND_CENTER/
          fi

          echo "Módulo instalado en backend/repair_agents:"
          find backend/repair_agents -maxdepth 2 -type f | sort

      - name: Validate Python syntax
        shell: bash
        run: |
          set -e
          python -m py_compile backend/repair_agents/*.py

      - name: Verify required files
        shell: bash
        run: |
          set -e

          REQUIRED_FILES=(
            "backend/repair_agents/__init__.py"
            "backend/repair_agents/router.py"
            "backend/repair_agents/diagnostic_agent.py"
            "backend/repair_agents/repair_agent.py"
            "backend/repair_agents/audit_agent.py"
            "backend/repair_agents/schemas.py"
            "backend/repair_agents/logs.py"
            "backend/repair_agents/safety.py"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "BLOQUEO_REAL: Falta $file"
              exit 1
            fi
          done

          echo "Todos los archivos obligatorios existen."

      - name: Commit installed module
        shell: bash
        run: |
          set -e

          git config user.name "hbc3-agent"
          git config user.email "hbc3-agent@users.noreply.github.com"

          git add backend/repair_agents HBC_COMMAND_CENTER || true

          if git diff --cached --quiet; then
            echo "Sin cambios que confirmar."
          else
            git commit -m "Install HBC3 repair_agents module"
            git push
          fi

      - name: Final status
        run: |
          echo "APTO PARA TESTING"
          echo "NO VALIDADO EN PRODUCCIÓN"
          echo "Siguiente paso: integrar router en backend principal y probar endpoints."
