name: HBC3 Bridge Audited Strict

on:
  workflow_dispatch:
    inputs:
      accion:
        description: "Qué debe hacer HBC3 Bridge"
        required: true
        default: "full"
        type: choice
        options:
          - test
          - fix-known
          - build-artifact
          - full
      commit_changes:
        description: "Hacer commit automático si el proyecto está en raíz"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      strict_final:
        description: "Fallar si assistant/message o repair/run-full no existen"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  actions: read

jobs:
  hbc3-bridge-audited:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Init report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p HBC_COMMAND_CENTER HBC3_RELEASE
          {
            echo "# HBC3 BRIDGE AUDITED REPORT"
            echo ""
            echo "Fecha UTC: $(date -u)"
            echo "Accion: ${{ inputs.accion }}"
            echo "Commit changes: ${{ inputs.commit_changes }}"
            echo "Strict final: ${{ inputs.strict_final }}"
            echo ""
          } > HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md

      - name: Detect project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "docker-compose.yml" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
            echo "Proyecto detectado en raíz." | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md
            exit 0
          fi

          ZIP=""
          for candidate in \
            "panel-generator-pro-v4-HBC3-ASSISTANT-FINAL.zip" \
            "HBC3_FINAL_DE_UNA_VEZ_V2_WORKFLOW_OK.zip" \
            "HBC3_FINAL_ROOT_DOCKER_OK.zip" \
            "HBC3_FINAL_DE_UNA_VEZ_REPAIR_AGENTS_FIX.zip"
          do
            if [ -f "$candidate" ]; then
              ZIP="$candidate"
              break
            fi
          done

          if [ -z "$ZIP" ]; then
            ZIP=$(ls -1 *.zip 2>/dev/null | grep -Ei "HBC3|panel-generator" | tail -n 1 || true)
          fi

          if [ -z "$ZIP" ] || [ ! -f "$ZIP" ]; then
            echo "BLOQUEO_REAL: no hay docker-compose.yml ni ZIP HBC3 válido." | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md
            exit 1
          fi

          rm -rf panel-test
          mkdir -p panel-test
          unzip -o "$ZIP" -d panel-test >/dev/null

          PROJECT_DIR=$(find panel-test -maxdepth 10 -name "docker-compose.yml" -exec dirname {} \; | head -1 || true)

          if [ -z "$PROJECT_DIR" ]; then
            echo "BLOQUEO_REAL: ZIP sin docker-compose.yml." | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md
            find panel-test -maxdepth 6 -type f | head -200 | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Proyecto detectado: $PROJECT_DIR" | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md

      - name: Fix known HBC3 failures
        if: inputs.accion == 'fix-known' || inputs.accion == 'full'
        shell: python
        run: |
          from pathlib import Path
          import os

          project = Path(os.environ["PROJECT_DIR"])
          report = Path("HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md")

          def log(msg):
              print(msg)
              with report.open("a", encoding="utf-8") as f:
                  f.write(msg + "\n")

          api = project / "backend" / "api.py"
          if not api.exists():
              log("BLOQUEO_REAL: no existe backend/api.py")
              raise SystemExit(1)

          text = api.read_text(encoding="utf-8")
          changed = False

          if "from backend.repair_agents.router import router as repair_router" in text:
              text = text.replace(
                  "from backend.repair_agents.router import router as repair_router",
                  "from repair_agents.router import router as repair_router",
              )
              changed = True
              log("CORREGIDO: import repair_agents.router")

          if "uvicorn.run(" in text and "import uvicorn" not in text:
              lines = text.splitlines()
              insert_at = 0
              for i, line in enumerate(lines):
                  s = line.strip()
                  if s.startswith("import ") or s.startswith("from "):
                      insert_at = i + 1
              lines.insert(insert_at, "import uvicorn")
              text = "\n".join(lines) + "\n"
              changed = True
              log("CORREGIDO: import uvicorn")

          api.write_text(text, encoding="utf-8")
          if not changed:
              log("SIN_CAMBIOS: fixes conocidos ya estaban aplicados o no proceden.")

      - name: Create testing env
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          cat > .env <<EOF
          DATABASE_URL=postgresql://panel_user:panel_password@postgres:5432/panel_generator
          DB_USER=panel_user
          DB_PASSWORD=panel_password
          DB_NAME=panel_generator
          DB_HOST=postgres
          DB_PORT=5432
          REDIS_URL=redis://redis:6379
          SECRET_KEY=testsecretkey1234567890abcdef
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          STRIPE_PUBLIC_KEY=pk_test_fake
          STRIPE_SECRET_KEY=sk_test_fake
          STRIPE_WEBHOOK_SECRET=whsec_fake
          PAYPAL_MODE=sandbox
          PAYPAL_CLIENT_ID=fake
          PAYPAL_CLIENT_SECRET=fake
          SENDGRID_API_KEY=SG.fake
          TWILIO_ACCOUNT_SID=fake
          TWILIO_AUTH_TOKEN=fake
          TWILIO_PHONE_NUMBER=+1234567890
          APP_ENV=development
          APP_DEBUG=True
          APP_URL=http://localhost:3000
          API_URL=http://localhost:8000
          ADMIN_URL=http://localhost:3001
          CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:8000
          LOG_LEVEL=INFO
          HBC3_ENV=testing
          ALLOW_REPAIR_APPLY=true
          EOF

      - name: Validate Python and required markers
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          python -m py_compile backend/api.py

          if [ -d backend/repair_agents ]; then
            python -m py_compile backend/repair_agents/*.py
          else
            echo "BLOQUEO_REAL: falta backend/repair_agents" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
            exit 1
          fi

          if grep -R "backend.repair_agents.router" backend/api.py backend/repair_agents 2>/dev/null; then
            echo "BLOQUEO_REAL: sigue el import antiguo backend.repair_agents.router" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
            exit 1
          fi

          grep -n "import uvicorn\|repair_agents.router" backend/api.py | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md" || true

      - name: Docker up
        if: inputs.accion == 'test' || inputs.accion == 'build-artifact' || inputs.accion == 'full'
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          docker compose up -d --build
          sleep 25
          docker compose ps | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"

      - name: Wait health
        if: inputs.accion == 'test' || inputs.accion == 'build-artifact' || inputs.accion == 'full'
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/health > "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/health.json"; then
              echo "health OK intento $i" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
              cat "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/health.json" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
              exit 0
            fi
            sleep 3
          done
          echo "BLOQUEO_REAL: /health no responde" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
          docker compose ps | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
          docker compose logs backend --tail=200 | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md" || true
          exit 1

      - name: Test endpoints strict
        if: inputs.accion == 'test' || inputs.accion == 'build-artifact' || inputs.accion == 'full'
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          test_endpoint () {
            local name="$1"
            local method="$2"
            local url="$3"
            local data="${4:-}"
            local required="${5:-true}"
            local outfile="$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/${name}.json"

            echo "## TEST $name" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"

            if [ "$method" = "POST" ]; then
              code=$(curl -sS -o "$outfile" -w "%{http_code}" -X POST "$url" -H "Content-Type: application/json" -d "$data" || true)
            else
              code=$(curl -sS -o "$outfile" -w "%{http_code}" "$url" || true)
            fi

            echo "HTTP $code" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
            cat "$outfile" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md" || true
            echo "" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"

            if [ "$code" != "200" ] && [ "$required" = "true" ]; then
              echo "BLOQUEO_REAL: $name falló con HTTP $code" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
              exit 1
            fi
          }

          test_endpoint "repair_logs" "GET" "http://localhost:8000/api/v1/repair/logs" "" "true"

          REQUIRED_FINAL="${{ inputs.strict_final }}"
          test_endpoint "assistant_message" "POST" "http://localhost:8000/api/v1/assistant/message" '{"message":"estado"}' "$REQUIRED_FINAL"
          test_endpoint "repair_run_full" "POST" "http://localhost:8000/api/v1/repair/run-full" '{"issue":"test bridge audited"}' "$REQUIRED_FINAL"

      - name: Check frontend chat
        if: inputs.accion == 'test' || inputs.accion == 'build-artifact' || inputs.accion == 'full'
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          code=$(curl -sS -o "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/frontend.html" -w "%{http_code}" http://localhost:3000 || true)
          echo "Frontend HTTP $code" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"

          if [ "$code" != "200" ]; then
            echo "BLOQUEO_REAL: frontend no responde 200" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
            exit 1
          fi

          if [ "${{ inputs.strict_final }}" = "true" ]; then
            if ! grep -Ei "hbc3-chat|Hablar con HBC3|HBC3 Asistente|chat-toggle" "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/frontend.html" > /dev/null; then
              echo "BLOQUEO_REAL: frontend no contiene chat HBC3" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"
              exit 1
            fi
          fi

      - name: Build artifact ZIP
        if: inputs.accion == 'build-artifact' || inputs.accion == 'full'
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          mkdir -p "$GITHUB_WORKSPACE/HBC3_RELEASE"

          zip -r "$GITHUB_WORKSPACE/HBC3_RELEASE/panel-generator-pro-v4-HBC3-BRIDGE-AUDITED.zip" . \
            -x "*.git*" \
            -x "*/__pycache__/*" \
            -x "*.pyc" \
            -x "*/node_modules/*" \
            -x ".env"

          ls -lh "$GITHUB_WORKSPACE/HBC3_RELEASE" | tee -a "$GITHUB_WORKSPACE/HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md"

      - name: Commit known fixes and report
        if: inputs.commit_changes == 'true' && (inputs.accion == 'fix-known' || inputs.accion == 'full')
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "hbc3-bridge"
          git config user.email "hbc3-bridge@users.noreply.github.com"

          if [ "$PROJECT_DIR" != "." ]; then
            echo "INFO: proyecto dentro de ZIP; no se hace commit de archivos extraídos." | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md
          fi

          git add HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md || true
          if [ "$PROJECT_DIR" = "." ]; then
            git add backend/api.py backend/repair_agents frontend 2>/dev/null || true
          fi

          if git diff --cached --quiet; then
            echo "Sin cambios que confirmar." | tee -a HBC_COMMAND_CENTER/HBC3_BRIDGE_REPORT.md
          else
            git commit -m "HBC3 bridge audited fixes"
            git push
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hbc3-bridge-audited-report
          path: HBC_COMMAND_CENTER/
          retention-days: 30

      - name: Upload release artifact
        if: inputs.accion == 'build-artifact' || inputs.accion == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: panel-generator-pro-v4-HBC3-BRIDGE-AUDITED
          path: HBC3_RELEASE/
          retention-days: 30

      - name: Backend logs on failure
        if: failure()
        shell: bash
        run: |
          cd "$PROJECT_DIR" 2>/dev/null || exit 0
          docker compose ps || true
          docker compose logs backend --tail=250 || true

      - name: Final status
        shell: bash
        run: |
          echo "HBC3 BRIDGE AUDITED FINAL"
          echo "APTO PARA TESTING si todos los pasos están en verde."
          echo "NO VALIDADO EN PRODUCCIÓN"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          cd "$PROJECT_DIR" 2>/dev/null && docker compose down -v || true
