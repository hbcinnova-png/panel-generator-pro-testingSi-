name: HBC3 Patch API Connect Repair Router

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/HBC3_PATCH_API_CONNECT_REPAIR_ROUTER.yml"

permissions:
  contents: write

jobs:
  patch-api-router:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Patch backend/api.py
        shell: python
        run: |
          from pathlib import Path

          api = Path("backend/api.py")
          status_dir = Path("HBC_COMMAND_CENTER")
          status_dir.mkdir(exist_ok=True)
          status_file = status_dir / "HBC3_PATCH_API_CONNECT_STATUS.md"

          if not api.exists():
              status_file.write_text(
                  "# HBC3 PATCH API CONNECT\n\nEstado: BLOQUEO_REAL\n\nNo existe backend/api.py.\n",
                  encoding="utf-8",
              )
              raise SystemExit("BLOQUEO_REAL: No existe backend/api.py")

          required = [
              "backend/repair_agents/router.py",
              "backend/repair_agents/diagnostic_agent.py",
              "backend/repair_agents/repair_agent.py",
              "backend/repair_agents/audit_agent.py",
              "backend/repair_agents/schemas.py",
              "backend/repair_agents/logs.py",
              "backend/repair_agents/safety.py",
          ]

          missing = [p for p in required if not Path(p).exists()]
          if missing:
              status_file.write_text(
                  "# HBC3 PATCH API CONNECT\n\nEstado: BLOQUEO_REAL\n\nFaltan archivos:\n\n"
                  + "\n".join(f"- {p}" for p in missing)
                  + "\n",
                  encoding="utf-8",
              )
              raise SystemExit(f"BLOQUEO_REAL: faltan archivos {missing}")

          text = api.read_text(encoding="utf-8")

          if "app.include_router(repair_router" in text:
              status_file.write_text(
                  "# HBC3 PATCH API CONNECT\n\nEstado: YA_CONECTADO\n\nbackend/api.py ya tiene repair_router.\n",
                  encoding="utf-8",
              )
              print("YA_CONECTADO")
              raise SystemExit(0)

          import_line = "from backend.repair_agents.router import router as repair_router"
          alt_import_line = "from repair_agents.router import router as repair_router"

          if import_line not in text and alt_import_line not in text:
              lines = text.splitlines()
              insert_at = 0
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("import ") or stripped.startswith("from "):
                      insert_at = i + 1

              lines.insert(insert_at, "# HBC3 repair_agents router")
              lines.insert(insert_at + 1, "try:")
              lines.insert(insert_at + 2, "    from backend.repair_agents.router import router as repair_router")
              lines.insert(insert_at + 3, "except ModuleNotFoundError:")
              lines.insert(insert_at + 4, "    from repair_agents.router import router as repair_router")

              text = "\n".join(lines) + "\n"

          include_block = "\n# HBC3 repair_agents router\napp.include_router(\n    repair_router,\n    prefix=\"/api/v1/repair\",\n    tags=[\"repair_agents\"],\n)\n"

          if "app.include_router(repair_router" not in text:
              text = text.rstrip() + "\n" + include_block

          api.write_text(text, encoding="utf-8")

          status_file.write_text(
              "# HBC3 PATCH API CONNECT\n\n"
              "Estado: CONECTADO\n\n"
              "Archivo: `backend/api.py`\n\n"
              "Router añadido:\n\n"
              "```python\n"
              "app.include_router(\n"
              "    repair_router,\n"
              "    prefix=\"/api/v1/repair\",\n"
              "    tags=[\"repair_agents\"],\n"
              ")\n"
              "```\n\n"
              "Estado: APTO PARA TESTING / NO VALIDADO EN PRODUCCIÓN.\n",
              encoding="utf-8",
          )

          print("CONECTADO backend/api.py")

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile backend/repair_agents/*.py
          python -m py_compile backend/api.py
          grep -n "repair_router" backend/api.py
          echo "backend/api.py conectado y compila"

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "hbc3-agent"
          git config user.email "hbc3-agent@users.noreply.github.com"

          git add backend/api.py HBC_COMMAND_CENTER/HBC3_PATCH_API_CONNECT_STATUS.md

          if git diff --cached --quiet; then
            echo "Sin cambios que confirmar."
          else
            git commit -m "Connect HBC3 repair_agents router in backend api"
            git push
          fi

      - name: Final status
        run: |
          echo "HBC3 FINAL"
          echo "repair_router conectado en backend/api.py"
          echo "APTO PARA TESTING"
          echo "NO VALIDADO EN PRODUCCIÓN"
