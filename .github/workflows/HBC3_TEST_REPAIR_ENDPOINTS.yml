name: HBC3 Test Repair Agents Endpoints

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/HBC3_TEST_REPAIR_ENDPOINTS.yml"
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"

permissions:
  contents: read

jobs:
  test-repair-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show HBC3 structure
        shell: bash
        run: |
          set -euo pipefail
          echo "=== ROOT ==="
          ls -la
          echo "=== BACKEND ==="
          ls -la backend || true
          echo "=== REPAIR_AGENTS ==="
          ls -la backend/repair_agents || true

      - name: Validate repair_agents Python
        shell: bash
        run: |
          set -euo pipefail
          test -f backend/repair_agents/router.py
          test -f backend/repair_agents/diagnostic_agent.py
          test -f backend/repair_agents/repair_agent.py
          test -f backend/repair_agents/audit_agent.py
          test -f backend/repair_agents/schemas.py
          test -f backend/repair_agents/logs.py
          test -f backend/repair_agents/safety.py
          python -m py_compile backend/repair_agents/*.py
          echo "repair_agents py_compile OK"

      - name: Locate FastAPI file and router connection
        shell: python
        run: |
          from pathlib import Path

          candidates = [Path("backend/api.py"), Path("backend/main.py"), Path("main.py"), Path("app/main.py")]
          candidates += [p for p in Path(".").rglob("*.py") if p not in candidates and "backend/repair_agents" not in p.as_posix()]

          found = None
          for p in candidates:
              if not p.exists():
                  continue
              try:
                  text = p.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              if "FastAPI(" in text and ("app =" in text or "app=FastAPI" in text or "app = FastAPI" in text):
                  found = p
                  print(f"FASTAPI_FILE={p}")
                  print("ROUTER_CONNECTED=", "app.include_router(repair_router" in text)
                  if "app.include_router(repair_router" not in text:
                      raise SystemExit("BLOQUEO_REAL: repair_router no está conectado en FastAPI.")
                  break

          if found is None:
              raise SystemExit("BLOQUEO_REAL: No se encontró archivo principal FastAPI.")

      - name: Docker compose build and start
        shell: bash
        run: |
          set -euo pipefail
          docker compose version
          docker compose config
          docker compose up -d --build
          docker compose ps

      - name: Wait for backend health
        shell: bash
        run: |
          set -euo pipefail

          echo "Esperando /health..."
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/health; then
              echo ""
              echo "HEALTH OK"
              exit 0
            fi
            sleep 3
          done

          echo "BLOQUEO_REAL: /health no respondió."
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Test repair_agents endpoints
        shell: bash
        run: |
          set -euo pipefail

          echo "=== GET /api/v1/repair/logs ==="
          curl -i http://localhost:8000/api/v1/repair/logs

          echo ""
          echo "=== POST /api/v1/repair/diagnose ==="
          curl -i -X POST http://localhost:8000/api/v1/repair/diagnose

          echo ""
          echo "=== POST /api/v1/repair/propose-fix ==="
          curl -i -X POST http://localhost:8000/api/v1/repair/propose-fix

          echo ""
          echo "=== POST /api/v1/repair/audit ==="
          curl -i -X POST http://localhost:8000/api/v1/repair/audit

          echo ""
          echo "=== POST /api/v1/repair/apply-fix ==="
          curl -i -X POST http://localhost:8000/api/v1/repair/apply-fix

      - name: Final logs
        if: always()
        shell: bash
        run: |
          docker compose ps || true
          docker compose logs --tail=160 || true
