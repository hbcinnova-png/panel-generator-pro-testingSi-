services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: panel-generator-db
    environment:
      POSTGRES_USER: ${DB_USER:-panel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-panel_password}
      POSTGRES_DB: ${DB_NAME:-panel_generator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-panel_user} -d ${DB_NAME:-panel_generator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panel-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: panel-generator-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panel-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: panel-generator-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-panel_user}:${DB_PASSWORD:-panel_password}@postgres:5432/${DB_NAME:-panel_generator}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    networks:
      - panel-network

  # Frontend
  frontend:
    image: node:18-alpine
    container_name: panel-generator-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: npx http-server -p 3000 -c-1
    networks:
      - panel-network

  # Admin Dashboard
  admin:
    image: node:18-alpine
    container_name: panel-generator-admin
    working_dir: /app
    volumes:
      - ./admin:/app
    ports:
      - "3001:3001"
    command: npx http-server -p 3001 -c-1
    networks:
      - panel-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: panel-generator-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - panel-network

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: panel-generator-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - panel-network

volumes:
  postgres_data:
  redis_data:

networks:
  panel-network:
    driver: bridge
