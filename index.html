<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Generator Pro</title>
  <link rel="stylesheet" href="/generator-assets/styles.css">
</head>
<body>
  <main class="generator-shell">
    <section class="hero">
      <p class="eyebrow">HBC3</p>
      <h1>Panel Generator Pro</h1>
      <h2>Genera Paneles Premium en Segundos</h2>
      <p>Configura tu Panel y prepara una vista premium lista para validar.</p>
    </section>

    <section class="config-card">
      <h2>Configura tu Panel</h2>
      <div class="theme-option" data-theme="premium">Premium</div>
      <div class="theme-option" data-theme="dark">Dark</div>
      <div class="theme-option" data-theme="light">Light</div>
      <div id="preview"></div>
      <button id="generate-preview" type="button">Generar Vista</button>
      <button id="save-budget" type="button">Guardar Presupuesto</button>
    </section>

    <section class="pricing">
      <h2>Planes de Precios</h2>
      <article>Starter</article>
      <article>Pro</article>
      <article>Enterprise</article>
    </section>
  </main>
  <script src="/generator-assets/app.js"></script>
  <script src="/generator-assets/hbc3-final-patch.js"></script>
  <script src="/generator-assets/hbc3-final-hotfix.js"></script>
</body>
</html>
