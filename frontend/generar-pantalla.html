<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBC3 Generador de Pantallas</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,Arial,sans-serif;background:#06111d;color:#fff;min-height:100vh;padding:18px}.wrap{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:380px 1fr;gap:18px}.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.28)}h1{font-size:26px;margin-bottom:6px}.sub{color:rgba(255,255,255,.7);margin-bottom:18px;font-size:14px}.group{margin-bottom:13px}label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}input,textarea,select{width:100%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.28);color:#fff;border-radius:12px;padding:12px;font-size:15px}textarea{min-height:86px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.buttons{display:grid;gap:10px;margin-top:14px}.btn{border:0;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:900;cursor:pointer;color:#fff;text-align:center;text-decoration:none}.primary{background:linear-gradient(135deg,#ff006e,#00d9ff)}.secondary{background:rgba(255,255,255,.08);border:1px solid #00d9ff;color:#6be8ff}.ok{background:#00aa44}.previewBox{min-height:760px;border-radius:22px;overflow:hidden;background:#0a1020;border:1px solid rgba(255,255,255,.12)}iframe{width:100%;height:760px;border:0;display:block}.status{margin-top:10px;font-size:13px;color:#8cffb0;font-weight:800}.small{font-size:12px;color:rgba(255,255,255,.65);margin-top:10px;line-height:1.4}@media(max-width:860px){body{padding:10px}.wrap{grid-template-columns:1fr}.previewBox{min-height:640px}iframe{height:640px}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>HBC3 · Generar pantalla</h1>
      <p class="sub">Rellena los datos, pulsa generar y descarga la pantalla HTML.</p>
      <div class="group"><label>Nombre</label><input id="name" value="Doctor Piscinas" /></div>
      <div class="group"><label>Descripción</label><textarea id="desc">Reparación de piscinas poliéster</textarea></div>
      <div class="row">
        <div class="group"><label>Teléfono / WhatsApp</label><input id="phone" value="600000000" /></div>
        <div class="group"><label>Email</label><input id="email" value="contacto@doctorpiscinas.com" /></div>
      </div>
      <div class="group"><label>Servicios, uno por línea</label><textarea id="services">Servicio principal
Presupuesto rápido
Contacto directo
Panel privado</textarea></div>
      <div class="row">
        <div class="group"><label>Color 1</label><input id="c1" type="color" value="#ff006e" /></div>
        <div class="group"><label>Color 2</label><input id="c2" type="color" value="#00d9ff" /></div>
      </div>
      <div class="buttons">
        <button class="btn primary" onclick="generate()">Generar pantalla</button>
        <a id="openBtn" class="btn secondary" href="#" target="_blank" rel="noopener">Abrir pantalla generada</a>
        <a id="downloadBtn" class="btn ok" href="#" download="pantalla-hbc3.html">Descargar HTML</a>
      </div>
      <div id="status" class="status">Listo.</div>
      <p class="small">Funciona sin login y sin backend. El archivo descargado se puede subir a web, enviar o revisar.</p>
    </section>
    <section class="previewBox"><iframe id="preview" title="Pantalla generada"></iframe></section>
  </div>
<script>
let lastUrl=null;
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function phone(v){const n=String(v||'').replace(/[^0-9]/g,'');return n||'34000000000'}
function rgb(hex){const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex||'');return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:[0,0,0]}
function build(){
 const name=esc(document.getElementById('name').value||'Tu Negocio');
 const desc=esc(document.getElementById('desc').value||'Pantalla generada por HBC3');
 const tel=esc(document.getElementById('phone').value||'');
 const wa=phone(tel);
 const email=encodeURIComponent(document.getElementById('email').value||'');
 const c1=document.getElementById('c1').value||'#ff006e';
 const c2=document.getElementById('c2').value||'#00d9ff';
 const r1=rgb(c1).join(','); const r2=rgb(c2).join(',');
 const services=(document.getElementById('services').value||'Servicio principal\nPresupuesto rápido\nContacto directo\nPanel privado').split('\n').map(s=>s.trim()).filter(Boolean).slice(0,8);
 return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${name}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,Arial,sans-serif;min-height:100vh;background:radial-gradient(circle at 20% 20%,rgba(${r1},.35),transparent 28%),radial-gradient(circle at 90% 10%,rgba(${r2},.28),transparent 30%),linear-gradient(135deg,#071018,#101827 55%,#02040a);color:#fff;display:flex;align-items:center;justify-content:center;padding:22px;overflow-x:hidden}.water{position:fixed;inset:auto -10% -25% -10%;height:45vh;background:linear-gradient(180deg,rgba(${r2},.02),rgba(${r2},.22));filter:blur(1px);animation:wave 7s ease-in-out infinite alternate;border-radius:50% 50% 0 0}.panel{position:relative;width:min(620px,100%);padding:34px;border-radius:28px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.20);box-shadow:0 24px 90px rgba(0,0,0,.45),0 0 60px rgba(${r1},.18);backdrop-filter:blur(18px);overflow:hidden}.badge{display:inline-flex;padding:8px 14px;border-radius:999px;background:rgba(${r1},.15);border:1px solid rgba(${r1},.45);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px}.title{font-size:clamp(34px,8vw,58px);line-height:1;font-weight:950;letter-spacing:-.05em;background:linear-gradient(135deg,#fff,${c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}.desc{font-size:18px;line-height:1.45;color:rgba(255,255,255,.8);margin-bottom:24px}.services{display:grid;grid-template-columns:1fr;gap:12px;margin:24px 0}.service{padding:16px 14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);font-weight:900;font-size:17px;text-align:center}.actions{display:grid;grid-template-columns:1fr;gap:12px;margin-top:24px}.btn{border:none;border-radius:18px;padding:17px 16px;font-weight:950;font-size:18px;text-decoration:none;text-align:center;color:#fff}.btn-primary{background:linear-gradient(135deg,${c1},${c2});box-shadow:0 12px 30px rgba(${r1},.35)}.btn-secondary{background:rgba(255,255,255,.08);border:1px solid rgba(${r2},.65);color:${c2}}.status{margin-top:20px;color:#6aff9d;font-size:15px;font-weight:900;text-align:center}.dot{display:inline-block;width:9px;height:9px;background:#6aff9d;border-radius:50%;box-shadow:0 0 18px #6aff9d;margin-right:8px;animation:pulse 1.4s infinite}@keyframes pulse{50%{opacity:.35;transform:scale(.78)}}@keyframes wave{from{transform:translateY(0) rotate(-1deg)}to{transform:translateY(-18px) rotate(1deg)}}@media(max-width:480px){.panel{padding:24px}.title{font-size:38px}.desc{font-size:16px}}</style></head><body><div class="water"></div><main class="panel"><div class="badge">Pantalla activa</div><h1 class="title">${name}</h1><p class="desc">${desc}</p><section class="services">${services.map(s=>`<div class="service">${esc(s)}</div>`).join('')}</section><div class="actions"><a class="btn btn-primary" href="mailto:${email}">Presupuesto</a><a class="btn btn-secondary" href="https://wa.me/${wa}" target="_blank" rel="noopener">WhatsApp</a></div><div class="status"><span class="dot"></span>Sistema Online · ${tel}</div></main></body></html>`;
}
function generate(){
 const html=build();
 document.getElementById('preview').srcdoc=html;
 if(lastUrl) URL.revokeObjectURL(lastUrl);
 lastUrl=URL.createObjectURL(new Blob([html],{type:'text/html'}));
 document.getElementById('openBtn').href=lastUrl;
 document.getElementById('downloadBtn').href=lastUrl;
 document.getElementById('status').textContent='Pantalla generada. Ya puedes abrirla o descargarla.';
}
document.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',()=>generate()));
generate();
</script>
</body>
</html>
